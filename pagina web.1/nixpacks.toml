[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@9.15.9", "pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @workspace/db run push || true", "pnpm --filter @workspace/api-server run build"]

[start]
cmd = "pnpm --filter @workspace/api-server run start"

