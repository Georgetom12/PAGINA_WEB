<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Señales VIP — Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
    a{color:#58a6ff;text-decoration:none}
    a:hover{text-decoration:underline}
    .navbar{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;gap:20px}
    .navbar h1{font-size:18px;color:#f0f6fc}
    .navbar a{color:#8b949e;font-size:14px}
    .navbar a:hover{color:#f0f6fc}
    .navbar .spacer{flex:1}
    .container{max-width:1100px;margin:0 auto;padding:24px}
    .card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;margin-bottom:16px}
    .card h2{font-size:16px;margin-bottom:12px;color:#f0f6fc}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
    .stat{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;text-align:center}
    .stat .num{font-size:36px;font-weight:700;color:#58a6ff}
    .stat .lbl{font-size:13px;color:#8b949e;margin-top:4px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #21262d}
    th{color:#8b949e;font-weight:600}
    tr:hover{background:#1c2128}
    .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
    .badge-pending{background:#533e00;color:#d29922}
    .badge-approved{background:#1a3a1a;color:#3fb950}
    .badge-rejected{background:#3a1a1a;color:#f85149}
    .badge-active{background:#1a3a1a;color:#3fb950}
    .badge-auto{background:#1a2a3a;color:#58a6ff}
    .badge-manual{background:#2a1a3a;color:#d2a8ff}
    .btn{display:inline-block;padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600}
    .btn-green{background:#238636;color:#fff}.btn-green:hover{background:#2ea043}
    .btn-red{background:#b91c1c;color:#fff}.btn-red:hover{background:#dc2626}
    .btn-blue{background:#1f6feb;color:#fff}.btn-blue:hover{background:#388bfd}
    form{display:inline}
    textarea{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:10px;font-size:14px;resize:vertical}
    input[type=text],input[type=password],select{background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:8px 12px;font-size:14px;width:100%;margin-bottom:12px}
    .alert-success{background:#1a3a1a;border:1px solid #3fb950;color:#3fb950;padding:12px;border-radius:6px;margin-bottom:16px}
  </style>
</head>
<body>
<nav class="navbar">
  <h1>📡 Señales VIP</h1>
  <a href="/admin">Dashboard</a>
  <a href="/admin/payments">Pagos</a>
  <a href="/admin/signal">Enviar señal</a>
  <a href="/admin/signals">Historial</a>
  <a href="/admin/webhook">TradingView</a>
  <div class="spacer"></div>
  <a href="/admin/logout">Salir</a>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
