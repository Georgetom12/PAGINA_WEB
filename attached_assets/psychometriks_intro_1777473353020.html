
<style>
*{margin:0;padding:0;box-sizing:border-box;}
#intro{position:relative;width:100%;height:520px;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:none;}
canvas#particles{position:absolute;top:0;left:0;width:100%;height:100%;}
.center{position:relative;z-index:10;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px;}
.logo-wrap{position:relative;}
.logo-ring{position:absolute;top:50%;left:50%;width:160px;height:160px;border-radius:50%;border:1px solid rgba(127,119,221,0.25);transform:translate(-50%,-50%);animation:spin 8s linear infinite;}
.logo-ring2{position:absolute;top:50%;left:50%;width:200px;height:200px;border-radius:50%;border:1px solid rgba(127,119,221,0.12);transform:translate(-50%,-50%);animation:spin 14s linear infinite reverse;}
.logo-hex{width:100px;height:100px;display:flex;align-items:center;justify-content:center;position:relative;}
.hex-svg{width:100px;height:100px;filter:drop-shadow(0 0 18px rgba(127,119,221,0.7));}
.psy-text{font-family:'Courier New',monospace;font-size:26px;font-weight:700;letter-spacing:0.22em;color:#fff;text-shadow:0 0 20px rgba(127,119,221,0.8),0 0 40px rgba(127,119,221,0.4);animation:fadeup 1.2s ease 0.8s both;}
.sub-text{font-family:'Courier New',monospace;font-size:10px;letter-spacing:0.35em;color:rgba(127,119,221,0.7);animation:fadeup 1.2s ease 1.3s both;}
.scan-line{position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(127,119,221,0.6),transparent);animation:scan 3s ease-in-out infinite;}
.corner{position:absolute;width:20px;height:20px;border-color:rgba(127,119,221,0.5);border-style:solid;}
.tl{top:16px;left:16px;border-width:1px 0 0 1px;}
.tr{top:16px;right:16px;border-width:1px 1px 0 0;}
.bl{bottom:16px;left:16px;border-width:0 0 1px 1px;}
.br{bottom:16px;right:16px;border-width:0 1px 1px 0;}
.data-line{position:absolute;font-family:'Courier New',monospace;font-size:9px;color:rgba(127,119,221,0.3);letter-spacing:0.1em;animation:blink 2s step-end infinite;}
.d1{bottom:40px;left:20px;}
.d2{bottom:40px;right:20px;}
.d3{top:40px;left:20px;}
.d4{top:40px;right:20px;}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
@keyframes fadeup{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes scan{0%{top:-2px;}50%{top:100%;}100%{top:-2px;}}
@keyframes blink{0%,100%{opacity:0.3;}50%{opacity:0.8;}}
@keyframes hexglow{0%,100%{filter:drop-shadow(0 0 18px rgba(127,119,221,0.7));}50%{filter:drop-shadow(0 0 30px rgba(127,119,221,1));}}
.hex-svg{animation:hexglow 2.5s ease-in-out infinite;}
</style>

<div id="intro">
  <canvas id="particles"></canvas>
  <div class="scan-line"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <span class="data-line d1">BTC ▲ 0.42%</span>
  <span class="data-line d2">OI ▼ 1.2%</span>
  <span class="data-line d3">SYS.ONLINE</span>
  <span class="data-line d4">v1.0.0</span>
  <div class="center">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo-ring2"></div>
      <div class="logo-hex">
        <svg class="hex-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5" fill="none" stroke="#7F77DD" stroke-width="1.5"/>
          <polygon points="50,15 83,32.5 83,67.5 50,85 17,67.5 17,32.5" fill="none" stroke="rgba(127,119,221,0.4)" stroke-width="0.8"/>
          <text x="50" y="56" text-anchor="middle" font-family="Courier New" font-size="22" font-weight="700" fill="#7F77DD" letter-spacing="1">PSY</text>
        </svg>
      </div>
    </div>
    <div class="psy-text">PSYCHOMETRIKS</div>
    <div class="sub-text">MARKET INTELLIGENCE SUITE</div>
  </div>
</div>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
const intro = document.getElementById('intro');

function resize(){canvas.width=intro.offsetWidth;canvas.height=intro.offsetHeight;}
resize();

const N = 90;
const pts = Array.from({length:N},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  vx:(Math.random()-0.5)*0.4,
  vy:(Math.random()-0.5)*0.4,
  r:Math.random()*1.5+0.5,
  pulse:Math.random()*Math.PI*2
}));

let mouse={x:-999,y:-999};
intro.addEventListener('mousemove',e=>{
  const r=intro.getBoundingClientRect();
  mouse.x=e.clientX-r.left;
  mouse.y=e.clientY-r.top;
});

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const t=Date.now()*0.001;

  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;

    const dx=p.x-mouse.x, dy=p.y-mouse.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<80){p.x+=dx/dist*0.8;p.y+=dy/dist*0.8;}

    const alpha=0.4+0.3*Math.sin(t*1.5+p.pulse);
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(127,119,221,${alpha})`;
    ctx.fill();
  });

  for(let i=0;i<N;i++){
    for(let j=i+1;j<N;j++){
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<110){
        ctx.beginPath();
        ctx.moveTo(pts[i].x,pts[i].y);
        ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle=`rgba(127,119,221,${0.18*(1-d/110)})`;
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(draw);
}
draw();
</script>
