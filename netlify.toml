[build]
  command = "npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/psychometriks run build"
  publish = "artifacts/psychometriks/dist/public"

[build.environment]
  NODE_VERSION = "22"
  BASE_PATH = "/"

[[redirects]]
  from = "/api/*"
  to = "https://workspaceapi-server-production-43ce.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
