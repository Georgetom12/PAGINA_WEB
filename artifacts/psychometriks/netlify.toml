# PSYCHOMETRIKS — Configuración legacy para Netlify (respaldo)
# Despliegue principal: Cloudflare Pages + _worker.js (ver carpeta public/)
# Sitio: www.psychometriks.trade

[build]
  publish = "dist/public"
  command = "pnpm run build:netlify"

[build.environment]
  NODE_VERSION = "20"

# Proxy del API hacia el backend en Railway
[[redirects]]
  from = "/api/*"
  to = "https://api.psychometriks.trade/api/:splat"
  status = 200
  force = true

# SPA routing — todas las rutas apuntan al index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
