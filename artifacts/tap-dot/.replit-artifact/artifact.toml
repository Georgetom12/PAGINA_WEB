kind = "mobile"
previewPath = "/"
title = "Tap the Dot"
version = "1.0.0"
id = "artifacts/tap-dot"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20359

[services.development]
run = "pnpm --filter @workspace/tap-dot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tap-dot", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tap-dot", "run", "serve" ]

[services.env]
PORT = "20359"
BASE_PATH = "/"
